name: Test

on: [push]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build ensjs
        run: pnpm -F @ensdomains/ensjs build

      - name: Start test environment
        run: pnpm -F @ensdomains/ensjs denv:detach

      - name: Wait for test environment
        run: |
          echo "Waiting for L1 RPC..."
          for i in $(seq 1 90); do
            if curl -sf -X POST --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' -H "Content-Type: application/json" http://localhost:8545 | grep -q result; then
              echo "L1 RPC ready"
              break
            fi
            sleep 2
          done
          echo "Waiting for L2 RPC..."
          for i in $(seq 1 90); do
            if curl -sf -X POST --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' -H "Content-Type: application/json" http://localhost:8546 | grep -q result; then
              echo "L2 RPC ready"
              break
            fi
            sleep 2
          done

      - name: Run tests
        run: pnpm -F @ensdomains/ensjs test --run

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm -F @ensdomains/ensjs build
