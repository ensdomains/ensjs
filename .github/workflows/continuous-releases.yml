name: Continuous Release
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm -r build --filter @ensdomains/ensjs-abi --filter @ensdomains/ensjs

      - name: Publish to pkg.pr.new
        run: pnpm dlx pkg-pr-new publish "./packages/ensjs-abi" "./packages/ensjs"
